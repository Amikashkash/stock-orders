# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STOCK_ORDERS_75BE0 }}' > /tmp/gcp-key.json
          npx firebase-tools deploy --project stock-orders-75be0 --only firestore:indexes,firestore:rules,hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
